name: Build and Deploy to Plesk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run build -- --mode production || (echo "❌ TypeScript check failed" && exit 1)

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify dist folder
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: La carpeta dist no fue generada"
            exit 1
          fi
          echo "Build exitoso"
          echo "Contenido de dist:"
          ls -la dist/ | head -20
          echo "Tamaño:"
          du -sh dist/
          echo "Número de archivos:"
          find dist -type f | wc -l

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./httpdocs/
          dangerous-clean-slate: true
          log-level: verbose
